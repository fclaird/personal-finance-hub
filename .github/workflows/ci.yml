name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  finance-hub:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/finance-hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/finance-hub/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test
      - run: npm run lint
      - run: node scripts/check-api-routes.mjs
